# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - left_arm_controller
    - right_arm_controller
    - head_controller

  left_arm_controller:
    type: FollowJointTrajectory
    joints:
      - L_Joint_1
      - L_Joint_2
      - L_Joint_3
      - L_Joint_4
      - L_Joint_5
      - L_Joint_6
      - L_Joint_7
    action_ns: follow_joint_trajectory
    default: true
  right_arm_controller:
    type: FollowJointTrajectory
    joints:
      - R_Joint_1
      - R_Joint_2
      - R_Joint_3
      - R_Joint_4
      - R_Joint_5
      - R_Joint_6
      - R_Joint_7
    action_ns: follow_joint_trajectory
    default: true
  head_controller:
    type: FollowJointTrajectory
    joints:
      - neck_joint
      - head_joint
    action_ns: follow_joint_trajectory
    default: true