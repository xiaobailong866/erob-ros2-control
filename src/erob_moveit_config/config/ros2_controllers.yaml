# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_arm_controller:
  ros__parameters:
    joints:
      - L_Joint_1
      - L_Joint_2
      - L_Joint_3
      - L_Joint_4
      - L_Joint_5
      - L_Joint_6
      - L_Joint_7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_arm_controller:
  ros__parameters:
    joints:
      - R_Joint_1
      - R_Joint_2
      - R_Joint_3
      - R_Joint_4
      - R_Joint_5
      - R_Joint_6
      - R_Joint_7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
head_controller:
  ros__parameters:
    joints:
      - neck_joint
      - head_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity